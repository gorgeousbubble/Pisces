# ipcam.conf — Nginx 反向代理配置
#
# 安装步骤：
#   sudo cp ipcam.conf /etc/nginx/sites-available/ipcam
#   sudo ln -s /etc/nginx/sites-available/ipcam /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL 证书（Let's Encrypt）：
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name _;

    # 将 HTTP 重定向到 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;   # 替换为你的域名或树莓派 IP

    # SSL 证书（Let's Encrypt 自动填充，或手动指定）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # 现代 SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # 客户端请求体大小限制（照片上传最大 10MB）
    client_max_body_size 10m;

    # -----------------------------------------------------------------------
    # 实时视频流（关键：禁用缓冲，保证实时性）
    # -----------------------------------------------------------------------
    location /stream/live {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # 禁用 Nginx 缓冲（MJPEG 流必须）
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;   # 长连接超时 1 小时
        proxy_send_timeout 3600s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 禁用响应缓冲
        add_header X-Accel-Buffering no;
    }

    # -----------------------------------------------------------------------
    # API 接口（普通反向代理）
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_buffering    on;
        proxy_read_timeout 30s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # 健康检查（无需认证，供监控系统使用）
    # -----------------------------------------------------------------------
    location /health {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 5s;
        access_log off;
    }

    # -----------------------------------------------------------------------
    # API 文档（开发环境可访问，生产环境可注释掉）
    # -----------------------------------------------------------------------
    location /docs {
        proxy_pass http://127.0.0.1:8000;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8000;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
    }
}
